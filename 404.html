<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | We Insure You</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B0F1A;
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo { width: 64px; height: 64px; margin-bottom: 2rem; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: #F59E0B;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.125rem;
            color: #94A3B8;
            max-width: 480px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: #F59E0B;
            color: #0B0F1A;
            text-decoration: none;
            font-weight: 600;
            border-radius: 999px;
            transition: background 0.2s;
        }
        a:hover { background: #D97706; }
    </style>
</head>
<body>
    <img src="/logo.svg" alt="We Insure You" class="logo">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist. Let's get you back to safety.</p>
    <a href="/">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>
</body>
</html>
